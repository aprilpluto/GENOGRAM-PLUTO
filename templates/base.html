<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pluto Genogram Pintar{% endblock %}</title>
  <meta name="description" content="Smart Family Mapping by Pluto for April — Buat genogram profesional dari teks.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pluto: {
              50: '#f0f4ff', 100: '#e0e9ff', 200: '#c7d6fe',
              300: '#a4b8fc', 400: '#8093f8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
              900: '#312e81', 950: '#1e1b4b',
            },
            accent: { DEFAULT: '#06b6d4', light: '#22d3ee', dark: '#0891b2' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            glow: { '0%': { boxShadow: '0 0 20px rgba(99,102,241,0.3)' }, '100%': { boxShadow: '0 0 40px rgba(6,182,212,0.4)' } },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/app.css">
  {% block head %}{% endblock %}
</head>
<body class="font-sans antialiased bg-slate-50 dark:bg-pluto-950 text-slate-800 dark:text-slate-100 transition-colors duration-300">
  {% block body %}{% endblock %}
  <script>
    (function() {
      const saved = localStorage.getItem('pluto-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
